<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Login Link</title>
</head>
<body style="margin:0;padding:0;background:#f8f9fa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 16px">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:#ffffff;border-radius:12px;overflow:hidden">
          <!-- Header -->
          <tr>
            <td style="background:#5b7f5e;padding:24px;text-align:center">
              <h1 style="margin:0;color:#ffffff;font-size:20px;font-weight:600">Zen Caregiving</h1>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:32px 24px">
              <p style="margin:0 0 16px;font-size:16px;color:#333;line-height:1.5">
                Hi! Tap the button below to sign in to the Zen Caregiving admin dashboard.
              </p>
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="padding:16px 0">
                    <a href="{{ .ConfirmationURL }}"
                       style="display:inline-block;background:#5b7f5e;color:#ffffff;text-decoration:none;padding:14px 32px;border-radius:8px;font-size:16px;font-weight:600">
                      Sign In
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin:16px 0 0;font-size:13px;color:#666;line-height:1.5">
                This link expires in 1 hour. If you didn't request this, you can safely ignore this email.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:16px 24px;border-top:1px solid #e0e0e0;text-align:center">
              <p style="margin:0;font-size:12px;color:#999">
                Zen Caregiving Volunteer Shift Tracker
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
